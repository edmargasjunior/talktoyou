<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="app-window-title">TalkToYou</title>

    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link rel="icon" type="image/svg+xml" href="assets/icons/logo.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="alarm-overlay">
        <h1 id="alarm-msg">HORA DE...</h1>
        <img id="alarm-img" alt="Alarme">
        <button class="btn btn-alarm-ok" onclick="stopAlarm()">OK</button>
    </div>

    <header>
        <button class="header-btn" id="header-back" onclick="navigateBack()">⬅️</button>
        <div class="app-title" id="ui-title">Comunicação Alternativa</div>
        <button class="header-btn" onclick="toggleMenu()">☰</button>
    </header>

    <div id="menu-overlay" onclick="toggleMenu()"></div>
    <div id="side-menu">
        <button onclick="toggleMenu()" class="menu-close-btn">✕</button>
        <div class="menu-item" onclick="openModal('add')">➕ <span id="txt-add">Incluir Novo</span></div>
        <div class="menu-item" onclick="openModal('manage')">⚙️ <span id="txt-manage">Gerenciar Itens</span></div>
        <div class="menu-item" onclick="exportToPDF()">🖨️ <span id="txt-print">Imprimir Prancha</span></div>
    </div>

    <main class="board-container">
        <div id="path-text">Início</div>
        <div class="board" id="board-grid"></div>
    </main>

    <canvas id="resize-canvas" style="display:none;"></canvas>

    <div id="form-modal" class="modal">
        <h2 id="modal-title">Configurar</h2>
        <input type="hidden" id="edit-id">
        
        <div class="form-group">
            <label for="item-type">Tipo</label>
            <select id="item-type">
                <option value="card">CARD (Simples)</option>
                <option value="folder">PASTA (Categoria)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="item-parent">Pai (Onde ele ficará?)</label>
            <select id="item-parent"></select>
        </div>
        
        <div class="form-group">
            <label for="item-label">Nome</label>
            <input type="text" id="item-label" placeholder="Ex: LANCHE">
        </div>
        
        <div class="form-group">
            <label for="item-alarm">Despertador (Opcional)</label>
            <input type="time" id="item-alarm">
        </div>
        
        <label class="btn-photo">
            <span id="photo-status">📷 Tirar ou Escolher Foto</span>
            <input type="file" id="item-image" accept="image/*" hidden onchange="processImage(this)">
        </label>
        
        <div id="audio-form-group">
            <div id="record-btn" onclick="toggleRecording()">🎤</div>
            <div id="record-status">Toque para gravar sua voz</div>
        </div>
        
        <button class="btn btn-primary" onclick="saveCRUDItem()">SALVAR NO APARELHO</button>
        <button id="btn-delete" class="btn btn-danger" onclick="deleteItem()">EXCLUIR</button>
        <button class="btn btn-secondary" onclick="closeModals()">CANCELAR</button>
    </div>

    <div id="manage-modal" class="modal">
        <h2>Gerenciar</h2>
        <div id="manage-list"></div>
        <button class="btn btn-secondary" onclick="closeModals()">FECHAR</button>
    </div>

    <script src="js/dexie-setup.js"></script>
    <script src="js/audio-service.js"></script>
    <script src="js/pdf-service.js"></script>
    <script src="js/app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log("PWA: Service Worker registrado com sucesso!"))
                .catch((err) => console.error("PWA: Falha ao registrar Service Worker:", err));
        }
    </script>

</body>
</html>
